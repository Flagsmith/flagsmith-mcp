      x-gram:
        name: list_feature_multivariate_options
        description: Retrieves all multivariate options for a feature flag.
    post:
      operationId: api_v1_projects_features_mv_options_create
      parameters:
      - in: path
        name: feature_pk
        schema:
          type: integer
        required: true
      - in: path
        name: project_pk
        schema:
          type: string
        required: true
      tags:
      - mcp
      requestBody:
        content:
          application/json:
            schema:
