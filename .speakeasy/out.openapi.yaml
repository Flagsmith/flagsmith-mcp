openapi: 3.1.0
info:
  title: mcp_openapi
  version: v1
  description: Flagsmith's Core and SDK APIs. Check out <a href='https://docs.flagsmith.com'>Flagsmith
    documentation</a>.
  contact:
    email: support@flagsmith.com
  license:
    name: BSD License
    identifier: BSD-3-Clause
servers:
- url: https://api.flagsmith.com
paths:
  /api/v1/environments/:
    get:
      operationId: api_v1_environments_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: project
        schema:
          type: integer
        description: ID of the project to filter by.
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvironmentSerializerWithMetadataList'
          description: ''
      x-gram:
        name: list_environments
        description: Lists all environments the user has access to
  /api/v1/environments/{environment_api_key}/create-change-request/:
    post:
      operationId: api_v1_environments_create_change_request_create
      parameters:
      - in: path
        name: environment_api_key
        schema:
          type: string
        required: true
      tags:
      - mcp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeRequestCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangeRequestCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangeRequestCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRequestCreate'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowsError'
          description: ''
      x-gram:
        name: create_environment_feature_change_request
        description: Creates a new change request for feature flag modifications in
          an environment.
  /api/v1/environments/{environment_api_key}/list-change-requests/:
    get:
      operationId: api_v1_environments_list_change_requests_retrieve
      parameters:
      - in: query
        name: committed
        schema:
          type:
          - boolean
          - 'null'
        description: Filter on the committed status of a change request.
      - in: path
        name: environment_api_key
        schema:
          type: string
        required: true
      - in: query
        name: feature_id
        schema:
          type: integer
        description: Filter for a particular feature.
      - in: query
        name: live_from_after
        schema:
          type: string
          format: date-time
        description: Filter change requests due to go live after this datetime.
      - in: query
        name: page
        schema:
          type: integer
        description: A page number within the paginated result set.
      - in: query
        name: page_size
        schema:
          type: integer
        description: Number of results to return per page.
      - in: query
        name: search
        schema:
          type: string
          minLength: 1
        description: Fuzzy search across Change Request titles.
      - in: query
        name: segment_id
        schema:
          type: integer
        description: Filter change requests which match a specific segment id.
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeRequestList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowsError'
          description: ''
      x-gram:
        name: list_environment_change_requests
        description: Retrieves all change requests for an environment.
  /api/v1/environments/{environment_pk}/features/{feature_pk}/versions/:
    get:
      operationId: api_v1_environments_features_versions_list
      parameters:
      - in: path
        name: environment_pk
        schema:
          type: integer
        required: true
      - in: path
        name: feature_pk
        schema:
          type: integer
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnvironmentFeatureVersionList'
          description: ''
      x-gram:
        name: get_environment_feature_versions
        description: Retrieves version information for a feature flag in a specific
          environment.
    post:
      operationId: api_v1_environments_features_versions_create
      parameters:
      - in: path
        name: environment_pk
        schema:
          type: integer
        required: true
      - in: path
        name: feature_pk
        schema:
          type: integer
        required: true
      tags:
      - mcp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentFeatureVersionCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EnvironmentFeatureVersionCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EnvironmentFeatureVersionCreate'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentFeatureVersionCreate'
          description: ''
      x-gram:
        name: create_environment_feature_version
        description: Creates a new version for a feature flag in a specific environment.
  /api/v1/environments/{environment_pk}/features/{feature_pk}/versions/{environment_feature_version_pk}/featurestates/:
    get:
      operationId: api_v1_environments_features_versions_featurestates_list
      parameters:
      - in: path
        name: environment_feature_version_pk
        schema:
          type:
          - string
          - 'null'
          format: uuid
        required: true
      - in: path
        name: environment_pk
        schema:
          type: integer
        required: true
      - in: path
        name: feature_pk
        schema:
          type: integer
        required: true
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomEnvironmentFeatureVersionFeatureState'
          description: ''
      x-gram:
        name: get_environment_feature_version_states
        description: Retrieves feature state information for a specific version in
          an environment.
    post:
      operationId: api_v1_environments_features_versions_featurestates_create
      parameters:
      - in: path
        name: environment_feature_version_pk
        schema:
          type:
          - string
          - 'null'
          format: uuid
        required: true
      - in: path
        name: environment_pk
        schema:
          type: integer
        required: true
      - in: path
        name: feature_pk
        schema:
          type: integer
        required: true
      tags:
      - mcp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomEnvironmentFeatureVersionFeatureState'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomEnvironmentFeatureVersionFeatureState'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomEnvironmentFeatureVersionFeatureState'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomEnvironmentFeatureVersionFeatureState'
          description: ''
      x-gram:
        name: create_environment_feature_version_state
        description: Creates a new feature state for a specific version in an environment.
  /api/v1/environments/{environment_pk}/features/{feature_pk}/versions/{environment_feature_version_pk}/featurestates/{id}/:
    put:
      operationId: api_v1_environments_features_versions_featurestates_update
      parameters:
      - in: path
        name: environment_feature_version_pk
        schema:
          type:
          - string
          - 'null'
          format: uuid
        required: true
      - in: path
        name: environment_pk
        schema:
          type: integer
        required: true
      - in: path
        name: feature_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this feature state.
        required: true
      tags:
      - mcp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomEnvironmentFeatureVersionFeatureState'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomEnvironmentFeatureVersionFeatureState'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomEnvironmentFeatureVersionFeatureState'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomEnvironmentFeatureVersionFeatureState'
          description: ''
      x-gram:
        name: update_environment_feature_version_state
        description: Updates an existing feature state for a specific version in an
          environment.
  /api/v1/organisations/:
    get:
      operationId: api_v1_organisations_list
      parameters:
