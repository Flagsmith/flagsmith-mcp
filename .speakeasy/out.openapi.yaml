              $ref: '#/components/schemas/Invite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Invite'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invite'
          description: ''
      x-gram:
        name: create_organization_invite
        description: Send an invitation to join the organization with specified role
          and permissions.
  /api/v1/organisations/{organisation_pk}/roles/:
    get:
      operationId: api_v1_organisations_roles_list
      parameters:
      - in: path
        name: organisation_pk
        schema:
          type: string
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
