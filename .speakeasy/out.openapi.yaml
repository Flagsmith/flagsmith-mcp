          type: integer
        description: A unique integer value identifying this organisation.
        required: true
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganisationSerializerFull'
          description: ''
      x-gram:
        name: list_projects_in_organization
        description: Retrieves all projects within a specified organization.
  /api/v1/projects/{id}/:
    get:
      operationId: api_v1_projects_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this project.
        required: true
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRetrieve'
          description: ''
      x-gram:
        name: get_project
        description: Retrieves comprehensive information about a specific project
          including configuration and statistics.
    put:
      operationId: api_v1_projects_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this project.
        required: true
      tags:
      - mcp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectUpdate'
          description: ''
      x-gram:
        name: update_project
        description: Updates project configuration settings such as the project name
          and feature visibility.
  /api/v1/projects/{id}/environments/:
    get:
      operationId: api_v1_projects_environments_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this project.
        required: true
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectList'
          description: ''
      x-gram:
        name: list_project_environments
        description: Retrieves all environments configured for the specified project.
  /api/v1/projects/{project_pk}/change-requests/:
    get:
      operationId: api_v1_projects_change_requests_list
      parameters:
      - in: query
        name: committed
        schema:
          type:
          - boolean
          - 'null'
        description: Filter on the committed status of a change request.
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: path
        name: project_pk
        schema:
          type: string
        required: true
      - in: query
        name: search
        schema:
          type: string
          minLength: 1
        description: Fuzzy search across Change Request titles.
      - in: query
        name: segment_id
        schema:
          type: integer
        description: Filter change requests which match a specific segment id.
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectChangeRequestListList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowsError'
          description: ''
      x-gram:
        name: list_project_change_requests
        description: Retrieves all change requests for a project.
  /api/v1/projects/{project_pk}/feature-health/events/:
    get:
      operationId: api_v1_projects_feature_health_events_list
      parameters:
      - in: path
        name: project_pk
        schema:
          type: string
        required: true
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureHealthEvent'
          description: ''
      x-gram:
        name: get_feature_health_events
        description: Retrieves feature health monitoring events and metrics for the
          project.
  /api/v1/projects/{project_pk}/features/:
    get:
      operationId: api_v1_projects_features_list
      parameters:
      - in: query
        name: environment
        schema:
          type: integer
        description: Integer ID of the environment to view features in the context
          of.
      - in: query
        name: group_owners
        schema:
          type: string
          minLength: 1
        description: Comma separated list of group owner ids to filter on
      - in: query
        name: identity
        schema:
          type: string
          minLength: 1
        description: ID of the identity to sort features with identity overrides first.
      - in: query
        name: is_archived
        schema:
          type: boolean
      - in: query
        name: is_enabled
        schema:
          type:
          - boolean
          - 'null'
        description: Boolean value to filter features as enabled or disabled.
      - in: query
        name: owners
        schema:
          type: string
          minLength: 1
        description: Comma separated list of owner ids to filter on
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: path
        name: project_pk
        schema:
          type: integer
          description: Changing the project selected will remove previous Feature
            States for the previously associated projects Environments that are related
            to this Feature. New default Feature States will be created for the new
            selected projects Environments for this Feature. Also this will remove
            any Tags associated with a feature as Tags are Project defined
        required: true
      - in: query
        name: search
        schema:
          type: string
          minLength: 1
      - in: query
        name: segment
        schema:
          type: integer
        description: Integer ID of the segment to retrieve segment overrides for.
      - in: query
        name: sort_direction
        schema:
          enum:
          - ASC
          - DESC
          type: string
          default: ASC
          minLength: 1
        description: |-
          * `ASC` - ASC
          * `DESC` - DESC
      - in: query
        name: sort_field
        schema:
          enum:
          - created_date
          - name
          type: string
          default: created_date
          minLength: 1
        description: |-
          * `created_date` - created_date
          * `name` - name
      - in: query
        name: tag_strategy
        schema:
          enum:
          - UNION
          - INTERSECTION
          type: string
          default: INTERSECTION
          minLength: 1
        description: |-
          * `UNION` - UNION
          * `INTERSECTION` - INTERSECTION
      - in: query
        name: tags
        schema:
          type: string
          minLength: 1
        description: Comma separated list of tag ids to filter on (AND with INTERSECTION,
          and OR with UNION via tag_strategy)
      - in: query
        name: value_search
        schema:
          type: string
          minLength: 1
        description: Value of type int, string, or boolean to filter features based
          on their values
      tags:
      - mcp
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedListFeatureList'
          description: ''
      x-gram:
        name: list_project_features
        description: Retrieves all feature flags within the specified project with
          pagination.
    post:
      operationId: api_v1_projects_features_create
      parameters:
      - in: path
        name: project_pk
        schema:
          type: integer
          description: Changing the project selected will remove previous Feature
            States for the previously associated projects Environments that are related
            to this Feature. New default Feature States will be created for the new
            selected projects Environments for this Feature. Also this will remove
            any Tags associated with a feature as Tags are Project defined
        required: true
      tags:
      - mcp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListFeature'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ListFeature'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ListFeature'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFeature'
          description: ''
      x-gram:
        name: create_feature
        description: Creates a new feature flag in the specified project with default
          settings.
  /api/v1/projects/{project_pk}/features/{feature_pk}/code-references/:
    get:
      operationId: api_v1_projects_features_code_references_retrieve
